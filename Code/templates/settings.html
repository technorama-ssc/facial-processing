<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technorama — Settings</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='index.css') }}">
    <style>
        .settings-group {
            margin: 2rem 0;
            padding: 1.5rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
        }
        .settings-group h2 {
            color: var(--gold-light);
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
        }
        .settings-group p {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }
        .variant-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 0.75rem;
        }
        .variant-card {
            background: var(--bg-row);
            border: 2px solid var(--border);
            border-radius: 6px;
            padding: 1rem;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            text-align: center;
        }
        .variant-card:hover {
            border-color: var(--gold-dim);
        }
        .variant-card.active {
            border-color: var(--green-light);
            background: #1a2010;
        }
        .variant-card .name {
            font-weight: 600;
            color: var(--text);
            display: block;
            margin-bottom: 0.25rem;
        }
        .variant-card .desc {
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        .variant-card .badge {
            display: inline-block;
            font-size: 0.6rem;
            font-family: var(--mono);
            background: var(--green-dim);
            color: var(--green-light);
            padding: 0.15rem 0.5rem;
            border-radius: 20px;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
<div class="panel">
    <div class="header">
        <h1 class="header-title">Settings</h1>
        <div class="header-rule"></div>
    </div>

    <nav class="nav">
        <a href="/">Filters</a>
        <a href="/tune">Intensity</a>
        <a href="/settings" class="active">Settings</a>
    </nav>

    <div class="settings-group">
        <h2>Reveal Mode</h2>
        <p>Choose how the "reveal" step shows the difference between original and filtered images.</p>
        <div class="variant-grid" id="variant-grid"></div>
    </div>

    <div class="footer">
        <span class="footer-count" id="status"></span>
    </div>
</div>

<script>
    let currentVariant = 'standard';
    let availableVariants = [];

    const VARIANT_INFO = {
        'standard': { label: 'Standard', desc: 'Colored overlay 5s → filtered images' },
        'slideshow': { label: 'Slideshow', desc: 'Alternates original/filtered every 2s' },
        'subtle': { label: 'Subtle', desc: 'Colored overlay at 8% opacity' },
        'split': { label: 'Split View', desc: 'Left: original, Right: filtered' }
    };

    async function loadVariant() {
        try {
            const res = await fetch('/reveal-variant');
            const data = await res.json();
            currentVariant = data.current;
            availableVariants = data.available;
            renderVariants();
        } catch (e) {
            console.error('Failed to load variant:', e);
        }
    }

    function renderVariants() {
        const grid = document.getElementById('variant-grid');
        grid.innerHTML = availableVariants.map(v => {
            const info = VARIANT_INFO[v] || {label: v, desc: ''};
            const isActive = v === currentVariant;
            return `
                <div class="variant-card ${isActive ? 'active' : ''}"
                     onclick="setVariant('${v}')">
                    <span class="name">${info.label}</span>
                    <span class="desc">${info.desc}</span>
                    ${isActive ? '<span class="badge">● Active</span>' : ''}
                </div>
            `;
        }).join('');
    }

    async function setVariant(variant) {
        try {
            const res = await fetch(`/reveal-variant/${variant}`, {method: 'POST'});
            const data = await res.json();
            if (data.ok) {
                currentVariant = variant;
                renderVariants();
                document.getElementById('status').textContent = `✅ Switched to "${VARIANT_INFO[variant]?.label || variant}"`;
                setTimeout(() => {
                    document.getElementById('status').textContent = '';
                }, 3000);
            } else {
                document.getElementById('status').textContent = '❌ Error switching variant';
            }
        } catch (e) {
            console.error('Failed to set variant:', e);
            document.getElementById('status').textContent = '❌ Error switching variant';
        }
    }

    loadVariant();
</script>
</body>
</html>
