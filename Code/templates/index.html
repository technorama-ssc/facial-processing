<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technorama Control | Filter Harmony</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='index.css') }}">
</head>
<body>
<div class="panel">
    <div class="header">
        <h1 class="header-title">Techno<span>rama</span></h1>
        <div class="header-rule"></div>
    </div>

    <nav class="nav">
        <a href="/" class="{{ 'active' if request.path == '/' else '' }}">Filters</a>
        <a href="/tune" class="{{ 'active' if request.path == '/tune' else '' }}">Intensity</a>
    </nav>

    <div id="filter-controls"></div>

    <div class="footer">
        <span class="footer-count" id="active-count"></span>
        <button class="btn-enable-all" onclick="enableAllFilters()">Enable All</button>
    </div>
</div>

<div id="minFilterToast" class="toast-message">⚠️ At least 3 filters must be enabled — action blocked</div>

<script>
    const MOCK_FILTERS = [
        {name: "noise_reduction", enabled: true},
        {name: "motion_blur", enabled: false},
        {name: "edge_enhance", enabled: true},
        {name: "chroma_key", enabled: false},
        {name: "lens_correction", enabled: true},
        {name: "color_grading", enabled: true},
        {name: "grain_simulation", enabled: false},
        {name: "vignette", enabled: true},
        {name: "sharpening", enabled: false},
        {name: "depth_of_field", enabled: true},
        {name: "light_leak", enabled: false},
        {name: "halation", enabled: false},
    ];

    let filtersData = [];

    let toastTimeout = null;

    function showToastMessage(message) {
        const toastEl = document.getElementById('minFilterToast');
        if (!toastEl) return;
        toastEl.textContent = message || "⚠️ At least 3 filters must be enabled — action blocked";
        toastEl.classList.add('show');
        if (toastTimeout) clearTimeout(toastTimeout);
        toastTimeout = setTimeout(() => {
            toastEl.classList.remove('show');
        }, 2200);
    }

    function enforceMinimumThreeEnabled() {
        let activeCount = filtersData.filter(f => f.enabled).length;
        let changed = false;
        if (activeCount < 3) {
            for (let i = 0; i < filtersData.length && activeCount < 3; i++) {
                if (!filtersData[i].enabled) {
                    filtersData[i].enabled = true;
                    activeCount++;
                    changed = true;
                }
            }
            if (changed) {
                console.warn(`[enforce] enabled additional filters to reach minimum 3 (now ${activeCount} active).`);
            }
        }
        return changed;
    }

    function updateCount() {
        const on = filtersData.filter(f => f.enabled).length;
        const countSpan = document.getElementById('active-count');
        if (countSpan) countSpan.textContent = `${on} / ${filtersData.length} active`;
    }

    function renderFilters() {
        const div = document.getElementById('filter-controls');
        if (!div) return;
        const twoCol = filtersData.length > 7;
        div.className = twoCol ? 'two-col' : '';
        div.innerHTML = filtersData.map((f, i) => `
            <label class="filter-row ${f.enabled ? 'active' : ''}"
                   aria-label="${f.name.replace(/_/g, ' ')} filter, ${f.enabled ? 'enabled' : 'disabled'}">
                <span class="filter-label">${f.name.replace(/_/g, ' ')}</span>
                <span class="toggle-pill">
                    <input type="checkbox" ${f.enabled ? 'checked' : ''}
                        data-filter-name="${f.name}"
                        onchange="toggleFilter('${f.name}', this)">
                    <span class="toggle-track">
                        <span class="toggle-thumb"></span>
                    </span>
                </span>
            </label>
        `).join('');
        updateCount();
    }

    async function toggleFilter(name, checkboxElem) {
        const filter = filtersData.find(f => f.name === name);
        if (!filter) return;

        const originalEnabledState = filter.enabled;
        const newDesiredState = checkboxElem.checked;

        if (originalEnabledState === newDesiredState) return;

        const currentlyActive = filtersData.filter(f => f.enabled).length;
        let wouldBeActive = currentlyActive;

        if (originalEnabledState === true && newDesiredState === false) {
            wouldBeActive = currentlyActive - 1;
        } else if (originalEnabledState === false && newDesiredState === true) {
            wouldBeActive = currentlyActive + 1;
        }

        if (wouldBeActive < 3) {
            checkboxElem.checked = originalEnabledState;
            const parentRow = checkboxElem.closest('.filter-row');
            if (parentRow) {
                if (originalEnabledState) parentRow.classList.add('active');
                else parentRow.classList.remove('active');
            }
            showToastMessage("Cannot disable: at least 3 filters must stay active");
            return;
        }

        filter.enabled = newDesiredState;
        const row = checkboxElem.closest('.filter-row');
        if (row) {
            if (newDesiredState) row.classList.add('active');
            else row.classList.remove('active');
        }
        updateCount();

        try {
            await fetch(`/filters/${name}/toggle`, {method: 'POST'});
        } catch (err) {
            console.warn("Backend toggle sync issue (non-critical):", err);
        }
    }

    async function enableAllFilters() {
        const disabled = filtersData.filter(f => !f.enabled);
        for (const f of disabled) {
            f.enabled = true;
            try {
                await fetch(`/filters/${f.name}/toggle`, {method: 'POST'});
            } catch (err) {
                console.warn("Backend sync issue:", err);
            }
        }
        renderFilters();
    }

    async function loadFilters() {
        filtersData = MOCK_FILTERS.map(f => ({...f}));

        try {
            const res = await fetch('/filters');
            if (res.ok) {
                const data = await res.json();
                if (data && Array.isArray(data.filters)) {
                    filtersData = data.filters.map(f => ({name: f.name, enabled: f.enabled}));
                } else {
                    console.warn("Unexpected API format, keeping mock structure");
                }
            } else {
                console.warn("API response error, using fallback mock filters");
            }
        } catch (err) {
            console.warn("Could not fetch filters, using mock data:", err);
        }

        const wasModified = enforceMinimumThreeEnabled();
        if (wasModified) {
            const activeAfterEnforce = filtersData.filter(f => f.enabled).length;
            if (activeAfterEnforce >= 3) {
                showToastMessage("At least 3 filters required — automatically enabled additional filters");
            }
        }
        renderFilters();
    }

    globalThis.__guardMinFilters = function () {
        const changed = enforceMinimumThreeEnabled();
        if (changed) {
            renderFilters();
            showToastMessage("Filter balance restored: minimum 3 active filters enforced");
        }
        return changed;
    };

    loadFilters();
</script>
</body>
</html>
